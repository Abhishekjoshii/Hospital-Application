apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 2
  selector:
    matchlabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7

          ports:
            - containerPort: 27017

          volumeMounts: 
            - name: mongodb-storage
              mountPath: /data/db
      volumes:
        - name: mongodb-storage 
          persistentVolumeClaim:
            ClaimName: mongodb-pvc