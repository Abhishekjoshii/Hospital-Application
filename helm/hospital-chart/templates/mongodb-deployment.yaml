apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Values.mongodb.name}}
spec:
  replicas: 1
  selector:
    matchlabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: "{{.Values.mongodb.image}}:{{.Values.mongodb.tag}}"

          ports:
            - containerPort: {{.Values.mongodb.port}}

          volumeMounts: 
            - name: mongodb-storage
              mountPath: /data/db
      volumes:
        - name: mongodb-storage 
          persistentVolumeClaim:
            ClaimName: {{.Values.persistent.pvcName}}